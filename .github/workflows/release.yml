name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Go vet
        run: go vet ./...

      - name: Require release tag commit on main
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          release_commit=$(git rev-list -n 1 "$RELEASE_SHA")
          if ! git merge-base --is-ancestor "$release_commit" origin/main; then
            echo 'Release tags must reference a commit reachable from origin/main.' >&2
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

      - name: Test with race detector
        run: go test -race -count=1 -p 4 ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Require Homebrew tap credential for stable releases
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" != *-* && -z "$HOMEBREW_TAP_TOKEN" ]]; then
            echo 'HOMEBREW_TAP_TOKEN is required to publish a stable Homebrew formula.' >&2
            exit 1
          fi

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          install-only: true

      - name: Validate release configuration
        run: goreleaser check

      - name: Publish GitHub Release
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artifacts
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-checksums: ./dist/checksums.txt

      - name: Publish Homebrew formula
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: ./scripts/publish-homebrew-formula.sh "$TAG"
