name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Go vet
        run: go vet ./...

      - name: Require release tag commit on main
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          release_commit=$(git rev-list -n 1 "$RELEASE_SHA")
          if ! git merge-base --is-ancestor "$release_commit" origin/main; then
            echo 'Release tags must reference a commit reachable from origin/main.' >&2
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2

      - name: Test with race detector
        run: go test -race -count=1 -p 4 ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Require Homebrew tap credential for stable releases
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" != *-* && -z "$HOMEBREW_TAP_TOKEN" ]]; then
            echo 'HOMEBREW_TAP_TOKEN is required to publish a stable Homebrew formula.' >&2
            exit 1
          fi

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: '~> v2'
          install-only: true

      - name: Validate release configuration
        run: goreleaser check

      - name: Publish GitHub Release
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-checksums: ./dist/checksums.txt

      - name: Publish Homebrew formula
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: ./scripts/publish-homebrew-formula.sh "$TAG"
