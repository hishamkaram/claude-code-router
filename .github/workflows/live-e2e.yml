name: Live Claude Code E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: live-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fixture:
    name: Fixture / ${{ matrix.os }} / Claude ${{ matrix.claude-version }} / ${{ matrix.protocol }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        claude-version: ["2.1.209", "latest"]
        protocol: [openai-chat, anthropic-native, openai-responses]
    env:
      CCR_LIVE_FIXTURE_PROTOCOL: ${{ matrix.protocol }}
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      CLAUDE_CODE_DISABLE_OFFICIAL_MARKETPLACE_AUTOINSTALL: "1"
      CLAUDE_CODE_DISABLE_AUTO_MEMORY: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Install Claude Code
        run: npm install --global "@anthropic-ai/claude-code@${{ matrix.claude-version }}"
      - name: Verify Claude Code version
        run: claude --version
      - name: Fixture Claude Code E2E
        run: make test-live-fixture

  macos-cua-helper:
    name: macOS CUA helper
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate portable helper protocol fixtures
        run: make test-cua-macos-fixture
      - name: Build macOS preview helper
        run: make build-cua-macos

  docker-cua-browser:
    name: Docker CUA browser fixture
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Build and exercise managed Docker browser
        run: make test-cua-docker-fixture
