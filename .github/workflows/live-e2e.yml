name: Live Claude Code E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: live-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fixture:
    name: Fixture / ${{ matrix.os }} / Claude ${{ matrix.claude-version }} / ${{ matrix.protocol }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        claude-version: ["2.1.209", "latest"]
        protocol: [openai, anthropic]
    env:
      CCR_LIVE_FIXTURE_PROTOCOL: ${{ matrix.protocol }}
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      CLAUDE_CODE_DISABLE_OFFICIAL_MARKETPLACE_AUTOINSTALL: "1"
      CLAUDE_CODE_DISABLE_AUTO_MEMORY: "1"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Install Claude Code
        run: npm install --global "@anthropic-ai/claude-code@${{ matrix.claude-version }}"
      - name: Verify Claude Code version
        run: claude --version
      - name: Fixture Claude Code E2E
        run: make test-live-fixture
