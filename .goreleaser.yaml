# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: claude-code-router

builds:
  - id: ccr
    main: ./cmd/ccr
    binary: ccr
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/hishamkaram/claude-code-router/internal/buildinfo.Version={{ .Version }}
      - -X github.com/hishamkaram/claude-code-router/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/hishamkaram/claude-code-router/internal/buildinfo.Date={{ .Date }}
      - -X github.com/hishamkaram/claude-code-router/internal/buildinfo.BuiltBy=goreleaser
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: ccr
    ids:
      - ccr
    formats:
      - tar.gz
    name_template: claude-code-router_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^ci:'
      - '^test:'

release:
  github:
    owner: hishamkaram
    name: claude-code-router
  draft: false
  prerelease: auto
  name_template: '{{ .Tag }}'
